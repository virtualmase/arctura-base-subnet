name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Validate CONTRIBUTING guide is in sync with repo ────────────────────
  verify-contrib:
    name: Verify CONTRIBUTING guide
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -e ".[dev]"

      - name: Verify env generator works
        run: |
          # Run in --check mode (reads env vars, non-interactive)
          python scripts/generate_env.py --check || true
          # Verify the script itself is importable and has no syntax errors
          python -c "import ast; ast.parse(open('scripts/generate_env.py').read()); print('✓ generate_env.py syntax OK')"

      - name: Verify Makefile targets exist
        run: |
          make help
          echo "✓ Makefile targets accessible"

      - name: Check CONTRIBUTING.md references are valid
        run: |
          # All files referenced in CONTRIBUTING.md must exist
          for f in scripts/generate_env.py scripts/setup_wallets.sh scripts/start_miner.sh scripts/start_validator.sh scripts/check_metagraph.sh .env.example Makefile; do
            if [ -f "$f" ]; then
              echo "✓ $f exists"
            else
              echo "✗ $f referenced in CONTRIBUTING.md but missing"
              exit 1
            fi
          done

  # ── Lint + Format + Types ────────────────────────────────────────────────
  quality:
    name: Code quality (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check arctura_base/ neurons/ tests/
      - run: black --check arctura_base/ neurons/ tests/
      - run: mypy arctura_base/ --ignore-missing-imports

  # ── Tests ────────────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --cov=arctura_base --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ── Security ─────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r arctura_base/ neurons/ -ll -f json -o bandit-report.json
      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
